<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LinguaAI" />
  <meta name="description" content="Traducción inteligente con IA en tu bolsillo" />
  <title>LinguaAI — Traducción Inteligente</title>
  <link rel="manifest" id="manifest-placeholder" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:          #07070d;
      --surface:     #0e0e1a;
      --surface2:    #141424;
      --border:      rgba(255,255,255,0.07);
      --border2:     rgba(255,255,255,0.12);
      --accent:      #5b5fef;
      --accent2:     #a78bfa;
      --accent3:     #34d399;
      --text:        #f0f0f8;
      --text-muted:  #6b6b8a;
      --text-dim:    #9898b8;
      --danger:      #f87171;
      --glow:        rgba(91,95,239,0.35);
      --glow2:       rgba(167,139,250,0.2);
      --radius:      18px;
      --radius-sm:   10px;
      --mono:        'DM Mono', monospace;
      --sans:        'DM Sans', sans-serif;
      --display:     'Syne', sans-serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── RESET ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    textarea, select { font-family: inherit; }
    select option { background: #1a1a2e; }

    /* ── NOISE TEXTURE OVERLAY ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.5;
    }

    /* ── ANIMATED BACKGROUND ORBS ───────────────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.12;
      animation: drift 20s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: 0; right: -50px; animation-delay: -7s; }
    .orb-3 { width: 250px; height: 250px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -13s; opacity: 0.07; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-20px) scale(1.05); }
      66%      { transform: translate(-20px,30px) scale(0.95); }
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      max-width: 480px; margin: 0 auto;
      padding: 0 16px 24px;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--glow);
    }
    .logo-text {
      font-family: var(--display);
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-badge {
      font-family: var(--mono);
      font-size: 9px; font-weight: 400;
      color: var(--accent3);
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 4px; padding: 2px 6px;
      text-transform: uppercase; letter-spacing: 1px;
      align-self: flex-end; margin-bottom: 2px;
    }
    .install-btn {
      font-family: var(--mono); font-size: 11px;
      color: var(--accent2);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      transition: all 0.2s;
      display: none;
    }
    .install-btn:hover { background: rgba(167,139,250,0.2); }
    .install-btn.visible { display: flex; align-items: center; gap: 6px; }

    /* ── LANGUAGE SELECTOR ──────────────────────────────────────── */
    .lang-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .lang-select-wrap {
      flex: 1; position: relative;
    }
    .lang-select-wrap::after {
      content: '▾';
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none; font-size: 12px;
    }
    .lang-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px; font-weight: 500;
      padding: 10px 32px 10px 12px;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .lang-select:focus { outline: none; border-color: var(--accent); }
    .swap-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.3s;
      color: var(--text-dim);
    }
    .swap-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: rotate(180deg); }
    .swap-btn.spinning { animation: spin-once 0.4s ease; }
    @keyframes spin-once { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── INPUT CARD ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.3s;
      position: relative;
    }
    .card.focused { border-color: rgba(91,95,239,0.4); box-shadow: 0 0 0 3px rgba(91,95,239,0.08); }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 6px;
    }
    .card-label {
      font-family: var(--mono); font-size: 10px;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .card-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
      transition: all 0.2s;
      background: transparent;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.active { background: rgba(91,95,239,0.2); color: var(--accent2); }
    .icon-btn.recording { background: rgba(248,113,113,0.15); color: var(--danger); animation: pulse-rec 1s ease infinite; }
    @keyframes pulse-rec { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    #source-input {
      width: 100%; min-height: 110px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 17px; font-weight: 300; line-height: 1.6;
      padding: 4px 14px 14px;
      resize: none;
      caret-color: var(--accent2);
    }
    #source-input::placeholder { color: var(--text-muted); font-weight: 300; }
    .char-count {
      font-family: var(--mono); font-size: 10px;
      color: var(--text-muted);
      padding: 0 14px 10px;
      text-align: right;
    }

    /* ── TRANSLATE BUTTON ───────────────────────────────────────── */
    .translate-btn {
      width: 100%; margin: 12px 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-family: var(--display); font-size: 15px; font-weight: 700;
      letter-spacing: 0.3px;
      padding: 14px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 24px var(--glow);
      transition: all 0.25s;
      position: relative; overflow: hidden;
    }
    .translate-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      opacity: 0; transition: opacity 0.25s;
    }
    .translate-btn:hover::before { opacity: 1; }
    .translate-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--glow); }
    .translate-btn:active { transform: translateY(1px); }
    .translate-btn:disabled {
      opacity: 0.5; cursor: not-allowed;
      box-shadow: none; transform: none;
    }
    .translate-btn span { position: relative; z-index: 1; }
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .translate-btn.loading .btn-spinner { display: block; }
    .translate-btn.loading .btn-label { display: none; }

    /* ── RESULT CARD ────────────────────────────────────────────── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      min-height: 80px;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .result-card.has-result {
      border-color: rgba(91,95,239,0.3);
      box-shadow: 0 0 0 1px rgba(91,95,239,0.08), 0 8px 32px rgba(0,0,0,0.3);
    }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 6px;
    }
    .result-text {
      padding: 4px 14px 14px;
      font-size: 18px; font-weight: 300; line-height: 1.6;
      color: var(--text);
      min-height: 40px;
      white-space: pre-wrap;
    }
    .result-text.empty { color: var(--text-muted); font-size: 14px; font-style: italic; }
    .result-text .typing-cursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--accent2); vertical-align: text-bottom;
      animation: blink 0.8s step-start infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    .copy-btn {
      font-family: var(--mono); font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.2s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--border2); }
    .copy-btn.copied { color: var(--accent3); border-color: rgba(52,211,153,0.3); }

    .listen-btn {
      width: 100%; margin-top: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 14px; font-weight: 500;
      padding: 11px 14px;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
      margin: 8px 14px 14px;
      width: calc(100% - 28px);
    }
    .listen-btn:hover { background: rgba(91,95,239,0.15); border-color: rgba(91,95,239,0.3); color: var(--text); }
    .listen-btn.speaking { color: var(--accent2); border-color: rgba(167,139,250,0.4); }
    .listen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── SECTION TITLE ──────────────────────────────────────────── */
    .section-title {
      font-family: var(--mono); font-size: 10px; font-weight: 400;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── HISTORY ────────────────────────────────────────────────── */
    #history-section { margin-top: 4px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: grid; grid-template-columns: 1fr auto;
      gap: 4px;
    }
    .history-item:hover { border-color: var(--border2); background: var(--surface2); }
    .history-orig {
      font-size: 13px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-trans {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500;
    }
    .history-langs {
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      grid-column: 2; grid-row: 1 / 3;
      align-self: center; text-align: right;
      white-space: nowrap;
    }
    .history-empty {
      text-align: center; padding: 20px;
      color: var(--text-muted); font-size: 13px;
    }
    .history-clear {
      font-family: var(--mono); font-size: 10px;
      color: var(--text-muted); text-decoration: none;
      cursor: pointer; background: none; border: none;
      margin-left: auto; display: block;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .history-clear:hover { color: var(--danger); }

    /* ── TOAST ──────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; pointer-events: none; z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(52,211,153,0.3); color: var(--accent3); }
    .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--danger); }

    /* ── WAVEFORM ANIMATION (voice) ─────────────────────────────── */
    .waveform {
      display: none; align-items: center; gap: 3px;
      height: 20px; padding: 0 14px 10px;
    }
    .waveform.active { display: flex; }
    .waveform-bar {
      width: 3px; border-radius: 2px;
      background: var(--accent);
      animation: wave 1.2s ease-in-out infinite;
    }
    .waveform-bar:nth-child(1) { height:8px;  animation-delay:0s; }
    .waveform-bar:nth-child(2) { height:16px; animation-delay:0.1s; }
    .waveform-bar:nth-child(3) { height:12px; animation-delay:0.2s; }
    .waveform-bar:nth-child(4) { height:18px; animation-delay:0.3s; }
    .waveform-bar:nth-child(5) { height:10px; animation-delay:0.4s; }
    .waveform-bar:nth-child(6) { height:14px; animation-delay:0.15s; }
    .waveform-bar:nth-child(7) { height:8px;  animation-delay:0.25s; }
    @keyframes wave {
      0%,100% { transform: scaleY(1); }
      50%      { transform: scaleY(0.3); }
    }

    /* ── SCROLLBAR ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── FADE IN ANIMATION ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card, .result-card, #history-section {
      animation: fadeUp 0.5s ease both;
    }
    .result-card { animation-delay: 0.1s; }
    #history-section { animation-delay: 0.2s; }
  </style>
</head>

<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">
    <!-- HEADER -->
    <header>
      <div class="logo">
        <div class="logo-icon">🌐</div>
        <div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span class="logo-text">LinguaAI</span>
            <span class="logo-badge">PWA</span>
          </div>
        </div>
      </div>
      <button class="install-btn" id="install-btn">
        <span>⬇</span> Instalar
      </button>
    </header>

    <!-- LANGUAGE SELECTOR -->
    <div class="lang-row">
      <div class="lang-select-wrap">
        <select class="lang-select" id="lang-from">
          <option value="es">🇪🇸 Español</option>
          <option value="en">🇺🇸 Inglés</option>
          <option value="pt">🇧🇷 Portugués</option>
          <option value="fr">🇫🇷 Francés</option>
          <option value="de">🇩🇪 Alemán</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="ja">🇯🇵 Japonés</option>
          <option value="zh">🇨🇳 Chino</option>
          <option value="ko">🇰🇷 Coreano</option>
          <option value="ar">🇸🇦 Árabe</option>
          <option value="ru">🇷🇺 Ruso</option>
        </select>
      </div>
      <button class="swap-btn" id="swap-btn" title="Intercambiar idiomas">⇄</button>
      <div class="lang-select-wrap">
        <select class="lang-select" id="lang-to">
          <option value="en">🇺🇸 Inglés</option>
          <option value="es">🇪🇸 Español</option>
          <option value="pt">🇧🇷 Portugués</option>
          <option value="fr">🇫🇷 Francés</option>
          <option value="de">🇩🇪 Alemán</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="ja">🇯🇵 Japonés</option>
          <option value="zh">🇨🇳 Chino</option>
          <option value="ko">🇰🇷 Coreano</option>
          <option value="ar">🇸🇦 Árabe</option>
          <option value="ru">🇷🇺 Ruso</option>
        </select>
      </div>
    </div>

    <!-- INPUT CARD -->
    <div class="card" id="input-card">
      <div class="card-header">
        <span class="card-label">Texto original</span>
        <div class="card-actions">
          <button class="icon-btn" id="mic-btn" title="Entrada por voz">🎤</button>
          <button class="icon-btn" id="clear-btn" title="Limpiar">✕</button>
        </div>
      </div>
      <textarea
        id="source-input"
        placeholder="Escribe aquí o usa el micrófono…"
        maxlength="500"
        rows="4"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <div class="waveform" id="waveform">
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
      </div>
      <div class="char-count"><span id="char-count">0</span>/500</div>
    </div>

    <!-- TRANSLATE BUTTON -->
    <button class="translate-btn" id="translate-btn">
      <span class="btn-label">✦ Traducir</span>
      <div class="btn-spinner"></div>
    </button>

    <!-- RESULT CARD -->
    <div class="result-card" id="result-card">
      <div class="result-header">
        <span class="card-label" style="font-family:var(--mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;">Traducción</span>
        <button class="copy-btn" id="copy-btn" disabled>
          <span id="copy-icon">⎘</span> <span id="copy-text">Copiar</span>
        </button>
      </div>
      <div class="result-text empty" id="result-text">La traducción aparecerá aquí…</div>
      <button class="listen-btn" id="listen-btn" disabled>
        <span id="listen-icon">🔊</span>
        <span id="listen-label">Escuchar traducción</span>
      </button>
    </div>

    <!-- HISTORY -->
    <div id="history-section">
      <div class="section-title">Historial</div>
      <button class="history-clear" id="clear-history" style="display:none">Borrar todo</button>
      <div class="history-list" id="history-list">
        <div class="history-empty">Tus últimas 5 traducciones aparecerán aquí</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  // ── SERVICE WORKER REGISTRATION ────────────────────────────────
  (function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    const swCode = `
const CACHE = 'lingua-v1';
const ASSETS = ['/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swURL, { scope: '/' })
      .then(() => console.log('[SW] Registered'))
      .catch(e => console.warn('[SW] Failed:', e));
  })();

  // ── PWA MANIFEST (dynamic) ─────────────────────────────────────
  (function injectManifest() {
    const manifest = {
      name: "LinguaAI — Traducción Inteligente",
      short_name: "LinguaAI",
      description: "Traducción inteligente con IA en tu bolsillo",
      start_url: "./",
      display: "standalone",
      background_color: "#07070d",
      theme_color: "#0a0a0f",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%235b5fef'/><text y='130' x='96' font-size='100' text-anchor='middle'>🌐</text></svg>", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='110' fill='%235b5fef'/><text y='350' x='256' font-size='280' text-anchor='middle'>🌐</text></svg>", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel  = 'manifest';
    link.href = url;
    document.head.appendChild(link);
  })();

  // ── STATE ──────────────────────────────────────────────────────
  const state = {
    currentTranslation: '',
    isRecording: false,
    isSpeaking: false,
    recognition: null,
  };

  // ── ELEMENT REFS ───────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const sourceInput  = $('source-input');
  const langFrom     = $('lang-from');
  const langTo       = $('lang-to');
  const swapBtn      = $('swap-btn');
  const translateBtn = $('translate-btn');
  const resultText   = $('result-text');
  const resultCard   = $('result-card');
  const copyBtn      = $('copy-btn');
  const listenBtn    = $('listen-btn');
  const micBtn       = $('mic-btn');
  const clearBtn     = $('clear-btn');
  const waveform     = $('waveform');
  const historyList  = $('history-list');
  const clearHistory = $('clear-history');
  const charCount    = $('char-count');
  const inputCard    = $('input-card');
  const installBtn   = $('install-btn');
  const toast        = $('toast');

  // ── LANGUAGE NAMES ─────────────────────────────────────────────
  const LANG_NAMES = {
    es:'Español', en:'Inglés', pt:'Portugués', fr:'Francés',
    de:'Alemán',  it:'Italiano', ja:'Japonés', zh:'Chino',
    ko:'Coreano', ar:'Árabe', ru:'Ruso'
  };

  // ── TOAST ──────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='') {
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2800);
  }

  // ── CHAR COUNT ─────────────────────────────────────────────────
  sourceInput.addEventListener('input', () => {
    charCount.textContent = sourceInput.value.length;
    inputCard.classList.toggle('focused', sourceInput.value.length > 0);
  });
  sourceInput.addEventListener('focus', () => inputCard.classList.add('focused'));
  sourceInput.addEventListener('blur',  () => { if (!sourceInput.value) inputCard.classList.remove('focused'); });

  // ── CLEAR INPUT ────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    sourceInput.value = '';
    charCount.textContent = '0';
    inputCard.classList.remove('focused');
  });

  // ── SWAP LANGUAGES ─────────────────────────────────────────────
  swapBtn.addEventListener('click', () => {
    const tmp = langFrom.value;
    langFrom.value = langTo.value;
    langTo.value   = tmp;
    swapBtn.classList.add('spinning');
    setTimeout(() => swapBtn.classList.remove('spinning'), 400);
    if (state.currentTranslation) {
      sourceInput.value = state.currentTranslation;
      charCount.textContent = sourceInput.value.length;
      resetResult();
    }
  });

  // ── RESET RESULT ───────────────────────────────────────────────
  function resetResult() {
    state.currentTranslation = '';
    resultText.textContent = 'La traducción aparecerá aquí…';
    resultText.className = 'result-text empty';
    resultCard.classList.remove('has-result');
    copyBtn.disabled = true;
    listenBtn.disabled = true;
    $('copy-text').textContent = 'Copiar';
    $('copy-icon').textContent = '⎘';
  }

  // ── TRANSLATION (Claude API) ────────────────────────────────────
  async function translate() {
    const text = sourceInput.value.trim();
    if (!text) { showToast('✦ Escribe algo primero', 'error'); return; }
    if (langFrom.value === langTo.value) { showToast('Elige idiomas diferentes', 'error'); return; }

    const from = LANG_NAMES[langFrom.value] || langFrom.value;
    const to   = LANG_NAMES[langTo.value]   || langTo.value;

    translateBtn.classList.add('loading');
    translateBtn.disabled = true;
    resultText.className = 'result-text';
    resultText.innerHTML = '<span class="typing-cursor"></span>';
    resultCard.classList.add('has-result');

    try {
      const langPair = `${langFrom.value}|${langTo.value}`;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
      const response = await fetch(url);

      const data = await response.json();
      if (data.responseStatus !== 200) throw new Error(data.responseDetails || 'Error de API');

      const translated = data.responseData?.translatedText?.trim() || '';
      if (!translated) throw new Error('Respuesta vacía');

      // Typewriter effect
      resultText.innerHTML = '';
      state.currentTranslation = translated;
      await typewriter(resultText, translated);

      copyBtn.disabled  = false;
      listenBtn.disabled = false;
      resultCard.classList.add('has-result');
      saveToHistory(text, translated, langFrom.value, langTo.value);

    } catch (err) {
      console.error(err);
      resultText.className = 'result-text empty';
      resultText.textContent = 'Error al traducir. Verifica tu conexión.';
      resultCard.classList.remove('has-result');
      showToast('⚠ ' + (err.message || 'Error de traducción'), 'error');
    } finally {
      translateBtn.classList.remove('loading');
      translateBtn.disabled = false;
    }
  }

  // Typewriter effect
  function typewriter(el, text, speed = 18) {
    return new Promise(resolve => {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      el.appendChild(cursor);
      const tick = () => {
        if (i < text.length) {
          el.insertBefore(document.createTextNode(text[i++]), cursor);
          setTimeout(tick, speed);
        } else {
          cursor.remove();
          resolve();
        }
      };
      tick();
    });
  }

  translateBtn.addEventListener('click', translate);
  sourceInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) translate();
  });

  // ── COPY ───────────────────────────────────────────────────────
  copyBtn.addEventListener('click', async () => {
    if (!state.currentTranslation) return;
    try {
      await navigator.clipboard.writeText(state.currentTranslation);
      copyBtn.classList.add('copied');
      $('copy-icon').textContent = '✓';
      $('copy-text').textContent = '¡Copiado!';
      showToast('Copiado al portapapeles', 'success');
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        $('copy-icon').textContent = '⎘';
        $('copy-text').textContent = 'Copiar';
      }, 2000);
    } catch {
      showToast('No se pudo copiar', 'error');
    }
  });

  // ── SPEECH SYNTHESIS ───────────────────────────────────────────
  listenBtn.addEventListener('click', () => {
    if (!state.currentTranslation) return;
    if (speechSynthesis.speaking) {
      speechSynthesis.cancel();
      state.isSpeaking = false;
      $('listen-icon').textContent  = '🔊';
      $('listen-label').textContent = 'Escuchar traducción';
      listenBtn.classList.remove('speaking');
      return;
    }
    const utter = new SpeechSynthesisUtterance(state.currentTranslation);
    utter.lang  = langTo.value;
    utter.rate  = 0.95;
    utter.pitch = 1;
    utter.onstart = () => {
      state.isSpeaking = true;
      $('listen-icon').textContent  = '⏹';
      $('listen-label').textContent = 'Detener';
      listenBtn.classList.add('speaking');
    };
    utter.onend = utter.onerror = () => {
      state.isSpeaking = false;
      $('listen-icon').textContent  = '🔊';
      $('listen-label').textContent = 'Escuchar traducción';
      listenBtn.classList.remove('speaking');
    };
    speechSynthesis.speak(utter);
  });

  // ── SPEECH RECOGNITION ────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.title = 'Reconocimiento de voz no disponible';
    micBtn.style.opacity = '0.3';
  } else {
    const recognition = new SpeechRecognition();
    recognition.continuous   = false;
    recognition.interimResults = true;
    state.recognition = recognition;

    recognition.onstart = () => {
      state.isRecording = true;
      micBtn.classList.add('recording');
      waveform.classList.add('active');
    };
    recognition.onresult = e => {
      let interim = '', final = '';
      for (const r of e.results) {
        if (r.isFinal) final += r[0].transcript;
        else interim += r[0].transcript;
      }
      sourceInput.value = final || interim;
      charCount.textContent = sourceInput.value.length;
    };
    recognition.onend = () => {
      state.isRecording = false;
      micBtn.classList.remove('recording');
      waveform.classList.remove('active');
      if (sourceInput.value.trim()) translate();
    };
    recognition.onerror = e => {
      state.isRecording = false;
      micBtn.classList.remove('recording');
      waveform.classList.remove('active');
      if (e.error !== 'no-speech') showToast('Error de micrófono: ' + e.error, 'error');
    };

    micBtn.addEventListener('click', () => {
      if (state.isRecording) { recognition.stop(); return; }
      recognition.lang = langFrom.value + '-' + langFrom.value.toUpperCase();
      try { recognition.start(); }
      catch { showToast('Error al iniciar el micrófono', 'error'); }
    });
  }

  // ── HISTORY ────────────────────────────────────────────────────
  const HISTORY_KEY = 'lingua_history';

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(orig, trans, from, to) {
    let h = getHistory();
    h.unshift({ orig, trans, from, to, ts: Date.now() });
    h = h.slice(0, 5);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    renderHistory();
  }

  function renderHistory() {
    const h = getHistory();
    clearHistory.style.display = h.length ? 'block' : 'none';
    if (!h.length) {
      historyList.innerHTML = '<div class="history-empty">Tus últimas 5 traducciones aparecerán aquí</div>';
      return;
    }
    historyList.innerHTML = h.map((item, i) => `
      <div class="history-item" data-idx="${i}">
        <div class="history-orig">${escHtml(item.orig)}</div>
        <div class="history-trans">${escHtml(item.trans)}</div>
        <div class="history-langs">${item.from} → ${item.to}</div>
      </div>
    `).join('');
    historyList.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const item = h[+el.dataset.idx];
        sourceInput.value = item.orig;
        charCount.textContent = item.orig.length;
        langFrom.value = item.from;
        langTo.value   = item.to;
        state.currentTranslation = item.trans;
        resultText.className = 'result-text';
        resultText.textContent = item.trans;
        resultCard.classList.add('has-result');
        copyBtn.disabled  = false;
        listenBtn.disabled = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  clearHistory.addEventListener('click', () => {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    showToast('Historial borrado', 'success');
  });

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── PWA INSTALL ────────────────────────────────────────────────
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('visible');
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installBtn.classList.remove('visible');
      showToast('✓ App instalada', 'success');
    }
    deferredPrompt = null;
  });
  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('visible');
    showToast('✓ LinguaAI instalada', 'success');
  });

  // ── INIT ───────────────────────────────────────────────────────
  renderHistory();
  </script>
</body>
</html>
